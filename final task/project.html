<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>PATHMAKANTH CART</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="project.css">
</head>

<body>

<div class="header">
  <h2>🛍 PATHMAKANTH ZONE</h2>
  <div>
    🛒 Cart: <span id="cartCount">0</span>
    <a href="cart.html"><button>View Cart</button></a>
  </div>
</div>

<div class="controls">
  <input type="text" id="search" placeholder="Search products...">
  
  <select id="category">
    <option value="">All Categories</option>
    <option value="men's clothing">Men</option>
    <option value="women's clothing">Women</option>
    <option value="electronics">Electronics</option>
    <option value="jewelery">Jewelry</option>
  </select>

  <button onclick="sortLow()">Low → High</button>
  <button onclick="sortHigh()">High → Low</button>
</div>

<!-- Skeleton Loader -->
<div class="products" id="skeleton"></div>

<!-- Error -->
<div id="error" class="error"></div>

<!-- Products -->
<div class="products" id="productList"></div>

<script src="project.js"></script>
</body>
</html>
